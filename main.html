<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Size Chart</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 60%;
            margin: 20px auto;
            border-collapse: collapse;
            background-color: white;
        }

        thead {
            background-color: #333;
            color: white;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tbody tr:hover {
            background-color: #e6f2ff;
        }
    </style>
</head>
<body>

    <h2>Size Chart</h2>

    <table>
        <thead>
            <tr>
                <th>Size</th>
                <th>Chest (inches)</th>
                <th>Waist (inches)</th>
                <th>Hip (inches)</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>S</td>
                <td>36 - 38</td>
                <td>30 - 32</td>
                <td>36 - 38</td>
            </tr>
            <tr>
                <td>M</td>
                <td>38 - 40</td>
                <td>32 - 34</td>
                <td>38 - 40</td>
            </tr>
            <tr>
                <td>L</td>
                <td>40 - 42</td>
                <td>34 - 36</td>
                <td>40 - 42</td>
            </tr>
            <tr>
                <td>XL</td>
                <td>42 - 44</td>
                <td>36 - 38</td>
                <td>42 - 44</td>
            </tr>
            <tr>
                <td>XXL</td>
                <td>44 - 46</td>
                <td>38 - 40</td>
                <td>44 - 46</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
